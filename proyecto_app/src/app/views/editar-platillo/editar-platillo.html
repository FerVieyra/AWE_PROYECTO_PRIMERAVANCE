<app-header></app-header>

<div class="edit-container">
  <div class="edit-card">
    <form (ngSubmit)="actualizarPlatillo()" class="edit-form">
      <div class="form-group">
        <label>Nombre del Platillo</label>
        <input type="text" [(ngModel)]="platillo.nombre" name="nombre" placeholder="{{prod()?.nombre}}" required>
      </div>

      <div class="form-group">
        <label>Descripción</label>
        <textarea [(ngModel)]="platillo.descripcion" name="descripcion" rows="4" placeholder="{{prod()?.descripcion}}"></textarea>
      </div>

      <div class="form-group">
        <label>Precio</label>
        <input type="number" [(ngModel)]="platillo.precio" name="precio" placeholder="{{prod()?.precio}}" step="0.01" required>
      </div>

      <div class="form-group">
        <label>Imagen Actual</label>
        <div class="current-image-preview">
          <img [src]="url + prod()?.imagen" alt="Vista previa">
        </div>
      </div>

      <div class="form-group">
        <label>Cambiar Imagen (Dejar vacío si no se quiere cambiar)</label>
        <div class="file-input-container">
          <input type="file" name="imagen" class="file-input">
        </div>
      </div>

      <button type="submit" class="btn-update">Actualizar Platillo</button>
      
      <div class="cancel-link-container">
        <a href="javascript:void(0)" (click)="cancelar()" class="cancel-link">Cancelar</a>
      </div>
    </form>
  </div>
</div>
