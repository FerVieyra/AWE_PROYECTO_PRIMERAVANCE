<app-header></app-header>

<div class="add-container">
  <div class="add-card">
    <h2 class="form-title">Añadir Nuevo Platillo</h2>
    
    <form (ngSubmit)="guardarPlatillo()" class="add-form">
      <div class="form-group">
        <label>Nombre del Platillo</label>
        <input type="text" [(ngModel)]="nuevoPlatillo.nombre" name="nombre" placeholder="Ej. Pizza Margherita" required>
      </div>

      <div class="form-group">
        <label>Descripción</label>
        <textarea [(ngModel)]="nuevoPlatillo.descripcion" name="descripcion" rows="4" placeholder="Escribe una breve descripción del platillo..."></textarea>
      </div>

      <div class="form-group">
        <label>Precio (MXN)</label>
        <input type="number" [(ngModel)]="nuevoPlatillo.precio" name="precio" placeholder="0.00" step="0.01" required>
      </div>

      <div class="form-group">
        <label>Subir Imagen del Platillo</label>
        <div class="file-input-wrapper">
          <input 
            type="file" 
            (change)="onFileSelected($event)" 
            class="file-input" 
            accept="image/*">
        </div>
      </div>

      <button type="submit" class="btn-save">Guardar platillo</button>
      
      <div class="cancel-link-container">
        <a href="javascript:void(0)" (click)="cancelar()" class="cancel-link">Cancelar y volver</a>
      </div>
    </form>
  </div>
</div>
