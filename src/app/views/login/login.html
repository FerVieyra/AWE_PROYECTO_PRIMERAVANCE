<app-header [nombreUsuario]="''"></app-header> <div class="nav-back">
  <a routerLink="" class="back-link">← Volver al inicio</a>
</div>

<div class="main-container">
  <div class="login-card">
    <h2 class="title">Inicio de Sesión</h2>

    <form (ngSubmit)="onLogin()" class="login-form">
      <div class="form-group">
        <label>Correo electrónico</label>
        <input 
          type="email" 
          name="correo" 
          placeholder="ejemplo@correo.com" 
          required>
      </div>

      <div class="form-group">
        <label>Contraseña</label>
        <input 
          type="password" 
          name="password" 
          placeholder="********" 
          required>
      </div>

      <button type="submit" class="btn-login" routerLink="/home">Iniciar Sesión</button>
    </form>

    <div class="footer-links">
      <span>¿No tienes cuenta? <a routerLink="/register" class="reg-link">Regístrate aquí</a></span>
    </div>
  </div>
</div>
