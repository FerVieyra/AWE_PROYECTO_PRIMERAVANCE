<app-header [nombreUsuario]="'administrador'"></app-header>

<div class="edit-container">
  <div class="edit-card">
    <form (ngSubmit)="actualizarPlatillo()" class="edit-form">
      <div class="form-group">
        <label>Nombre del Platillo</label>
        <input type="text" name="nombre" placeholder="Nombre del platillo" required>
      </div>

      <div class="form-group">
        <label>Descripción</label>
        <textarea name="descripcion" rows="4" placeholder="Descripción corta..."></textarea>
      </div>

      <div class="form-group">
        <label>Precio</label>
        <input type="number" name="precio" placeholder="0.00" step="0.01" required>
      </div>

      <div class="form-group">
        <label>Imagen Actual</label>
        <div class="current-image-preview">
          <img [src]="platillo.imagenUrl" alt="Vista previa">
        </div>
      </div>

      <div class="form-group">
        <label>Cambiar Imagen (Dejar vacío si no se quiere cambiar)</label>
        <div class="file-input-container">
          <input type="file" name="imagen" class="file-input">
        </div>
      </div>

      <button type="submit" class="btn-update">Actualizar Platillo</button>
      
      <div class="cancel-link-container">
        <a routerLink="/panel-admin" (click)="cancelar()" class="cancel-link">Cancelar</a>
      </div>
    </form>
  </div>
</div>
